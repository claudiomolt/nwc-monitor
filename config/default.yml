# NWC Monitor Configuration

# Global monitor settings (applied to all wallets by default)
monitor:
  poll_interval: 5000       # Check for payments every 5 seconds
  retry_delay: 10000        # Wait 10 seconds before retrying on error
  max_retries: -1           # -1 = infinite retries
  since_startup: true       # Only process payments received after service starts

# Wallet configurations
# Each wallet has its own independent action pipeline
wallets:
  # Example wallet
  - name: main
    connection_file: "~/.alby-cli/connection-secret-claudio.key"
    
    # Actions to execute for each payment (in order)
    actions:
      # Console logging
      - type: console
        enabled: true
        format: "⚡ [{wallet}] {amount_sats} sats | {description} | {payment_hash}"

      # File logging (JSONL format)
      - type: file
        enabled: true
        path: "./data/payments.jsonl"
        format: jsonl  # or csv

      # SQLite database storage
      - type: sqlite
        enabled: true
        database: "./data/payments.db"
        table: payments

      # Webhook (disabled by default)
      # - type: webhook
      #   enabled: true
      #   url: "https://api.example.com/payment"
      #   method: POST
      #   headers:
      #     Authorization: "Bearer YOUR_SECRET_TOKEN"
      #   retry: 3
      #   timeout: 5000

      # OpenClaw agent integration (disabled by default)
      # - type: session_send
      #   enabled: true
      #   gateway_url: "http://localhost:3000"
      #   agent_id: "main"
      #   message_template: "⚡ Payment received: {amount_sats} sats - {description}"

      # Email notifications (disabled by default)
      # - type: email
      #   enabled: true
      #   smtp:
      #     host: smtp.gmail.com
      #     port: 465
      #     secure: true
      #     user: "your-email@gmail.com"
      #     pass: "your-app-password"
      #   from: "NWC Monitor <noreply@example.com>"
      #   to: "recipient@example.com"
      #   subject_template: "⚡ Payment: {amount_sats} sats"
      #   body_template: |
      #     Payment received on {wallet}:
      #     - Amount: {amount_sats} sats
      #     - Description: {description}
      #     - Hash: {payment_hash}
      #     - Time: {settled_at}

# Template variables available in all actions:
# {wallet}       - Wallet name
# {amount_sats}  - Payment amount in satoshis
# {description}  - Payment description/memo
# {payment_hash} - Payment hash
# {preimage}     - Payment preimage (if available)
# {payer_pubkey} - Payer's public key (if available)
# {settled_at}   - Settlement timestamp (ISO 8601)
# {type}         - Payment type (invoice or keysend)
# {id}           - Unique payment ID
