# NWC Monitor — Production Config

monitor:
  pollInterval: 60000
  limit: 50

wallets:
  - name: claudio
    nwc: "nostr+walletconnect://PUBKEY?relay=wss://relay.example.com&secret=SECRET"
    actions:
      - type: console
        enabled: true
        template: "⚡ [{wallet}] {amount_sats} sats - {description}"

      - type: sqlite
        enabled: true
        database: "./data/claudio.db"

      - type: session_send
        enabled: true
        channel: whatsapp
        target: "+1234567890"
        template: "⚡ Pago recibido: {amount_sats} sats — {description}"
