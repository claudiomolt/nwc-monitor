# NWC Monitor — Example Configuration
# Copy this file to ~/.nwc-monitor/config.yml and edit with your values.

monitor:
  pollInterval: 60000             # Polling fallback interval in ms
  limit: 50                       # Max payments per poll

wallets:
  - name: my-wallet
    nwc: "nostr+walletconnect://PUBKEY?relay=wss://relay.example.com&secret=SECRET"
    actions:
      - type: console
        enabled: true
        template: "⚡ [{wallet}] {amount_sats} sats - {description}"

      - type: sqlite
        enabled: true
        database: "./data/payments.db"

      # Uncomment to get WhatsApp/Telegram notifications via OpenClaw:
      # - type: session_send
      #   enabled: true
      #   channel: whatsapp
      #   target: "+1234567890"
      #   template: "⚡ Payment received: {amount_sats} sats — {description}"
